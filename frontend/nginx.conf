server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the app under /dj-app/ and fallback for SPA routing
    location /dj-app/ {
        alias /usr/share/nginx/html/dj-app/;
        try_files $uri $uri/ /dj-app/index.html;
    }

    # Redirect bare root to the app
    location = / {
        return 301 /dj-app/;
    }
}
